{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>TimeCapsule</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="static/capsule/style.css">
    </head>
    <body>
        <div class="container">
            <h1>Time Capsule</h1>
            <form action="" method="post">
                {% csrf_token %}

                <input
                    class="field"
                    type="text"
                    name="title"
                    placeholder="Letter Title">
                

                <textarea
                    class="letter"
                    name="description"
                    placeholder="To me, in future..."></textarea>
                
                <button type="submit">
                    Save Capsule
                </button>
            </form>
        </div>
        
        <script src="" async defer></script>
    </body>
</html>
